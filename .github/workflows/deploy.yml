name: Deploy to GitHub Pages

on:
  # Deploy on every push to main, and allow manual runs from the Actions tab.
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        # Absolute URLs (canonical / OG) resolve against the Pages domain.
        env:
          SITE_URL: https://anninumai.github.io

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
